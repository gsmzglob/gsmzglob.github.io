<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Mod File | Xprave</title>
    <style>
        /* Modern Dark Gamer Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background-color: #16161a;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            text-align: center;
            border: 1px solid #24242b;
        }

        h1 {
            color: #ff4e50;
            font-size: 26px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .mod-info {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .mod-details {
            background: #202027;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            font-size: 13px;
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        /* Ad Slots */
        .ad-box {
            margin: 20px 0;
            padding: 10px;
            background: #1e1e24;
            border-radius: 10px;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed #334155;
        }

        /* Countdown Timer */
        #timer-container {
            font-size: 16px;
            margin: 25px 0;
            color: #f9d423;
            font-weight: 600;
            background: rgba(249, 212, 35, 0.1);
            padding: 12px;
            border-radius: 30px;
            border: 1px solid rgba(249, 212, 35, 0.2);
        }

        /* Premium Download Button */
        .download-btn {
            display: none; /* Hidden until timer finishes */
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            color: #ffffff !important;
            font-weight: bold;
            text-transform: uppercase;
            padding: 16px 40px;
            margin: 20px auto 0 auto;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 78, 80, 0.4);
            text-decoration: none !important;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            width: fit-content;
            font-size: 15px;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 78, 80, 0.6);
            background: linear-gradient(135deg, #f9d423, #ff4e50);
        }
    </style>
</head>
<body>

    <div style="display: none;">
        <img src="https://via.placeholder.com/600x400" alt="Mod Image">
    </div>

    <div class="container">
        <h1>GTA SA Ultra Graphics Mod HD</h1>
        
        <div class="mod-info">
            <p>Download the latest verified premium mod file. Safe, fast, and fully optimized for all devices.</p>
            <div class="mod-details">
                <span><strong>File Size:</strong> 24.5 MB</span> | 
                <span><strong>Credits:</strong> Xprave</span>
            </div>
        </div>

        <div class="ad-box">
            <p style="color: #475569; font-size: 11px; margin: 0;">ADVERTISEMENT</p>
        </div>

        <div id="timer-container">
            Your secure download link is generating... Wait <span id="countdown">10</span> seconds.
        </div>

        <a href="https://www.mediafire.com/your_mod_file_link" id="download-link" class="download-btn">
            Download Now (Direct Link)
        </a>

        <div class="ad-box" style="margin-top: 30px;">
            <p style="color: #475569; font-size: 11px; margin: 0;">ADVERTISEMENT</p>
        </div>
    </div>

    <script>
        var timeLeft = 10; // Adjust seconds here
        var timerElement = document.getElementById('countdown');
        var timerContainer = document.getElementById('timer-container');
        var downloadBtn = document.getElementById('download-link');

        var downloadTimer = setInterval(function(){
            timeLeft--;
            timerElement.textContent = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(downloadTimer);
                timerContainer.style.display = 'none';
                downloadBtn.style.display = 'inline-flex';
            }
        }, 1000);
    </script>

</body>
</html>
